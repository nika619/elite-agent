<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELITE — AI Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0c0f;
      --surface: #111419;
      --border:  #1e2530;
      --text:    #cdd6e4;
      --muted:   #4a5568;
      --green:   #3ddc84;
      --blue:    #58a6ff;
      --yellow:  #e3b341;
      --red:     #ff6b6b;
      --purple:  #bc8cff;
      --cyan:    #79c0ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr 72px;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 3px;
      color: var(--green);
    }
    .logo span { color: var(--muted); font-weight: 400; }
    .stats {
      display: flex; gap: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--muted);
    }
    .stats .val { color: var(--cyan); }

    /* ── Chat window ── */
    #chat {
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }

    .msg-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .msg-meta .route { margin-left: 8px; padding: 1px 7px; border-radius: 3px;
      font-size: 10px; font-weight: 600; letter-spacing: 1px;
      background: var(--border); color: var(--text);
    }
    .route-coder    { background: #1a3a2a !important; color: var(--green) !important; }
    .route-search   { background: #182535 !important; color: var(--blue) !important; }
    .route-file     { background: #2e2509 !important; color: var(--yellow) !important; }
    .route-system   { background: #1a2535 !important; color: var(--cyan) !important; }
    .route-telegram { background: #25152e !important; color: var(--purple) !important; }
    .route-error    { background: #2e1515 !important; color: var(--red) !important; }
    .route-llm      { background: var(--border) !important; color: var(--text) !important; }

    .bubble {
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 780px;
    }
    .user .bubble {
      background: #131c2b;
      border-left: 3px solid var(--blue);
      color: var(--text);
      align-self: flex-end;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .thinking .bubble {
      border-left: 3px solid var(--muted);
      color: var(--muted);
      font-style: italic;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    /* ── Input bar ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }
    .prompt-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--green);
      white-space: nowrap;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      caret-color: var(--green);
    }
    #input::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--green);
      color: #0a0c0f;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .15s;
    }
    #send-btn:hover { opacity: .8; }
    #send-btn:disabled { opacity: .35; cursor: default; }

    /* ── Scrollbar ── */
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: var(--bg); }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<header>
  <div class="logo">ELITE<span> AI AGENT</span></div>
  <div class="stats">
    <span>CPU <span class="val" id="cpu">—</span>%</span>
    <span>RAM <span class="val" id="ram">—</span>%</span>
    <span>DISK <span class="val" id="disk">—</span>%</span>
  </div>
</header>

<div id="chat">
  <div class="msg bot">
    <div class="msg-meta">system <span class="route">INFO</span></div>
    <div class="bubble">Welcome to ELITE AI Agent v2.0.
Type any command — coder, search, file ops, system stats, or just ask a question.
Model: deepseek-r1:7b via Ollama</div>
  </div>
</div>

<footer>
  <span class="prompt-label">ELITE&nbsp;»</span>
  <input id="input" type="text" placeholder="Enter command or question…" autocomplete="off" />
  <button id="send-btn">SEND</button>
</footer>

<script>
  const chat     = document.getElementById('chat');
  const input    = document.getElementById('input');
  const sendBtn  = document.getElementById('send-btn');

  const ROUTE_CLASSES = {
    coder: 'route-coder', search: 'route-search', file: 'route-file',
    system: 'route-system', telegram: 'route-telegram', error: 'route-error',
    llm: 'route-llm', orchestrator: 'route-llm',
  };

  function timestamp() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  function addMsg(role, text, route) {
    const cls = role === 'user' ? 'user' : 'bot';
    const div = document.createElement('div');
    div.className = `msg ${cls}`;

    if (role !== 'user') {
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      const routeTag = route || 'llm';
      const routeCls = ROUTE_CLASSES[routeTag] || 'route-llm';
      meta.innerHTML = `${timestamp()} <span class="route ${routeCls}">${routeTag.toUpperCase()}</span>`;
      div.appendChild(meta);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function send() {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    sendBtn.disabled = true;

    addMsg('user', msg);

    // thinking indicator
    const thinking = document.createElement('div');
    thinking.className = 'msg bot thinking';
    thinking.innerHTML = `<div class="bubble">thinking…</div>`;
    chat.appendChild(thinking);
    chat.scrollTop = chat.scrollHeight;

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg}),
      });
      const data = await res.json();
      thinking.remove();
      addMsg('bot', data.response || '(empty response)', data.route);
    } catch (err) {
      thinking.remove();
      addMsg('bot', 'Network error: ' + err.message, 'error');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

  // ── Live stats polling ──────────────────────────────────────────
  async function updateStats() {
    try {
      const r = await fetch('/status');
      const d = await r.json();
      document.getElementById('cpu').textContent  = d.cpu;
      document.getElementById('ram').textContent  = d.ram_percent;
      document.getElementById('disk').textContent = d.disk_percent;
    } catch (_) {}
  }
  updateStats();
  setInterval(updateStats, 5000);

  input.focus();
</script>
</body>
</html>
